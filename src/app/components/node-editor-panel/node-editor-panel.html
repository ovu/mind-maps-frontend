<aside class="w-72 h-full bg-white border-l border-gray-200 p-4 overflow-y-auto shrink-0">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-sm font-semibold text-gray-900">Node Editor</h2>
    <button
      (click)="close.emit()"
      class="p-1 text-gray-400 hover:text-gray-600 rounded hover:bg-gray-100"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="space-y-4">
    <!-- Type -->
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Type</label>
      <select
        [ngModel]="currentType"
        (ngModelChange)="onTypeChange($event)"
        class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="text">Text</option>
        <option value="link">Link</option>
        <option value="picture">Picture</option>
      </select>
    </div>

    <!-- Text -->
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Text</label>
      <input
        type="text"
        [ngModel]="currentText"
        (blur)="onTextBlur($any($event.target).value)"
        class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Node text…"
      />
    </div>

    <!-- Color -->
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Color</label>
      <div class="flex items-center gap-2 mb-2">
        <input
          type="color"
          [value]="currentColor"
          (input)="onColorChange($any($event.target).value)"
          class="w-8 h-8 border border-gray-300 rounded cursor-pointer"
        />
        <span class="text-xs text-gray-400">{{ currentColor }}</span>
      </div>
      <div class="flex flex-wrap gap-1.5">
        @for (color of presetColors; track color) {
          <button
            (click)="onColorChange(color)"
            class="w-6 h-6 rounded-full border-2 transition-transform hover:scale-110"
            [style.background-color]="color"
            [class.border-gray-900]="currentColor === color"
            [class.border-transparent]="currentColor !== color"
            [title]="color"
          ></button>
        }
      </div>
    </div>

    <!-- Link URL (only for link type) -->
    @if (currentType === 'link') {
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">URL</label>
        <input
          type="url"
          [ngModel]="currentValue"
          (blur)="onValueBlur($any($event.target).value)"
          class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="https://…"
        />
        @if (currentValue) {
          <a
            [href]="currentValue"
            target="_blank"
            rel="noopener"
            class="inline-flex items-center gap-1 mt-1.5 text-xs text-blue-600 hover:text-blue-800 hover:underline"
          >
            Open link
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </a>
        }
      </div>
    }

    <!-- Picture controls (only for picture type) -->
    @if (currentType === 'picture') {
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Upload Image</label>
        <input
          type="file"
          accept="image/png,image/jpeg"
          (change)="onFileSelected($event)"
          class="w-full text-xs text-gray-600 file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
        />
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Or from URL</label>
        <div class="flex gap-1">
          <input
            type="url"
            [ngModel]="imageUrlInput()"
            (ngModelChange)="imageUrlInput.set($event)"
            (keydown.enter)="setImageUrl()"
            class="flex-1 px-2 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="https://…"
          />
          <button
            (click)="setImageUrl()"
            [disabled]="!imageUrlInput().trim()"
            class="px-2 py-1.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white text-xs rounded-lg transition-colors"
          >
            Set
          </button>
        </div>
      </div>

      <!-- Image Preview -->
      @if (node().value) {
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Preview</label>
          <img
            [src]="getImageSrc()"
            alt="Node image"
            class="w-full rounded-lg border border-gray-200 max-h-40 object-contain bg-gray-50"
          />
        </div>
      }
    }

    <!-- Actions -->
    <div class="pt-2 border-t border-gray-100 space-y-2">
      <button
        (click)="addChild()"
        [disabled]="saving()"
        class="w-full py-2 px-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white text-sm font-medium rounded-lg transition-colors"
      >
        + Add Child
      </button>
      @if (!isRoot()) {
        <button
          (click)="deleteNode()"
          [disabled]="saving()"
          class="w-full py-2 px-3 bg-red-50 hover:bg-red-100 disabled:opacity-60 text-red-700 text-sm font-medium rounded-lg transition-colors border border-red-200"
        >
          Delete Node
        </button>
      }
    </div>
  </div>

  @if (saving()) {
    <div class="mt-3 text-center text-xs text-gray-400">Saving…</div>
  }
</aside>
